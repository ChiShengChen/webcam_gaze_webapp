<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaze Benchmark · v1 (WebGazer)</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        height: 100%; overflow: hidden;
        background: #0c0c10; color: #ddd;
        font-family: system-ui, -apple-system, sans-serif;
      }

      #panel {
        position: fixed;
        top: 12px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        padding: 10px 14px; border-radius: 8px;
        display: flex; gap: 8px; align-items: center;
        z-index: 100; font-size: 13px;
      }
      #panel button {
        background: #222; color: #eee; border: 1px solid #444;
        padding: 6px 14px; border-radius: 16px; font-size: 13px; cursor: pointer;
      }
      #panel button:disabled { opacity: 0.35; cursor: not-allowed; }
      #panel button.primary { background: #2a5; border-color: #2a5; }
      #panel input {
        background: #181820; color: #eee; border: 1px solid #333;
        padding: 5px 8px; border-radius: 6px; font-size: 12px; width: 200px;
      }
      #status {
        position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
        font-size: 13px; color: #9cf; z-index: 100;
        background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 12px;
      }

      /* Calibration layer */
      #calib-layer {
        position: fixed; inset: 0; display: none; z-index: 200;
        background: rgba(0,0,0,0.5);
      }
      .calib-dot {
        position: absolute; width: 28px; height: 28px;
        background: #ffd700; border: 2px solid #fff;
        border-radius: 50%; transform: translate(-50%, -50%);
        cursor: pointer; opacity: 0.3;
        box-shadow: 0 0 12px rgba(255,215,0,0.6);
      }
      .calib-dot.done { background: #2a5; }

      /* Task dot (during grid/drift) */
      #task-dot {
        position: fixed; display: none; width: 24px; height: 24px;
        background: #ffd700; border: 2px solid #fff;
        border-radius: 50%; transform: translate(-50%, -50%);
        pointer-events: none; z-index: 150;
        box-shadow: 0 0 16px rgba(255,215,0,0.9);
      }

      /* Live gaze cursor (faint, optional) */
      #gaze-dot {
        position: fixed; display: none; width: 14px; height: 14px;
        background: rgba(240,80,80,0.35); border: 1px solid rgba(255,255,255,0.6);
        border-radius: 50%; transform: translate(-50%, -50%);
        pointer-events: none; z-index: 140;
      }
    </style>
  </head>
  <body>
    <div id="panel">
      <button id="start-btn" class="primary">Start &amp; calibrate</button>
      <button id="grid-btn" disabled>Run grid (5×5)</button>
      <button id="drift-btn" disabled>Run drift (5 min)</button>
      <button id="export-btn" disabled>Export JSON</button>
      <input id="notes" placeholder="notes (e.g. lighting, head)" />
    </div>
    <div id="status">Click “Start &amp; calibrate” to begin.</div>

    <div id="calib-layer"></div>
    <div id="task-dot"></div>
    <div id="gaze-dot"></div>

    <script type="module" src="/src/benchmark.ts"></script>
  </body>
</html>
